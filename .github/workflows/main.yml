name: Auto FX Quant Agent

on:
  schedule:
    # 12時間ごとに自動実行（日本時間の午前9時と午後9時に設定）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 手動で「今すぐ実行」できるボタンも用意

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Pythonの準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ライブラリのインストール
        run: pip install -r requirements.txt

      - name: Firebaseの秘密鍵を復元
        run: echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

      - name: エージェント（main.py）の実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python main.py